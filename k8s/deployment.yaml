apiVersion: apps/v1
kind: Deployment
metadata:
  name: wishdrop-app
  namespace: wishdrop
  labels:
    app.kubernetes.io/name: wishdrop
    app.kubernetes.io/component: app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: wishdrop
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wishdrop
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: wishdrop
          image: wishdrop:latest  # Replace with your registry, e.g. ghcr.io/youruser/wishdrop:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wishdrop-config
            - secretRef:
                name: wishdrop-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12  # 60s max startup time
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: false  # Next.js needs to write to .next/cache
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 30
