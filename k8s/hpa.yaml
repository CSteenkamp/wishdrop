# Optional: Horizontal Pod Autoscaler
# Requires metrics-server installed in the cluster
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wishdrop-app
  namespace: wishdrop
  labels:
    app.kubernetes.io/name: wishdrop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wishdrop-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
