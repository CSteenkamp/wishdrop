apiVersion: v1
kind: Service
metadata:
  name: wishdrop-app
  namespace: wishdrop
  labels:
    app.kubernetes.io/name: wishdrop
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wishdrop
    app.kubernetes.io/component: app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
