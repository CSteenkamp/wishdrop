# Run this BEFORE deploying new app versions that include schema changes.
# kubectl apply -f k8s/migration-job.yaml
# kubectl logs -n wishdrop job/wishdrop-migrate -f
apiVersion: batch/v1
kind: Job
metadata:
  name: wishdrop-migrate
  namespace: wishdrop
  labels:
    app.kubernetes.io/name: wishdrop
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wishdrop
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: wishdrop:latest  # Same image as the app
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: wishdrop-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
