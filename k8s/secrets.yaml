# IMPORTANT: Replace placeholder values with real base64-encoded secrets before applying.
# Generate with: echo -n 'your-value' | base64
#
# In production, use a secrets manager (e.g., Sealed Secrets, External Secrets Operator,
# HashiCorp Vault) instead of committing this file.
apiVersion: v1
kind: Secret
metadata:
  name: wishdrop-secrets
  namespace: wishdrop
  labels:
    app.kubernetes.io/name: wishdrop
type: Opaque
data:
  # echo -n 'postgresql://wishdrop:password@wishdrop-db:5432/wishdrop?schema=public' | base64
  DATABASE_URL: CHANGEME_BASE64

  # echo -n 'your-super-secret-key-for-signing-tokens' | base64
  MAGIC_LINK_SECRET: CHANGEME_BASE64

  # echo -n 'sk_live_xxx...' | base64
  STRIPE_SECRET_KEY: CHANGEME_BASE64

  # echo -n 'whsec_xxx...' | base64
  STRIPE_WEBHOOK_SECRET: CHANGEME_BASE64

  # echo -n 'price_xxx...' | base64
  STRIPE_PRICE_ID: CHANGEME_BASE64

  # echo -n 'your-email@gmail.com' | base64
  EMAIL_USER: CHANGEME_BASE64

  # echo -n 'your-app-password' | base64
  EMAIL_PASS: CHANGEME_BASE64
